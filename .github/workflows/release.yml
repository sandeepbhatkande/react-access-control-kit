name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Ensure NPM_TOKEN is set
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::Repository secret NPM_TOKEN is missing or empty."
            exit 1
          fi
          echo "NPM_TOKEN secret is present"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Read version
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Skip if already published
        id: check
        run: |
          if npm view "react-access-control-kit@$(node -p "require('./package.json').version")" version >/dev/null 2>&1; then
            echo "already=true" >> "$GITHUB_OUTPUT"
            echo "Version already on npm — skipping publish"
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.check.outputs.already != 'true'
        run: |
          set -euo pipefail
          echo "Publishing react-access-control-kit@${{ steps.version.outputs.value }}"
          # Explicit auth for registry (setup-node also writes this; keep both in sync)
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc
          echo "registry=https://registry.npmjs.org/" >> .npmrc
          export NPM_CONFIG_PROVENANCE=false
          if ! npm publish --access public 2>&1 | tee publish.log; then
            echo "::error::npm publish failed. Common causes: invalid/expired NPM_TOKEN, token missing Publish permission, or 2FA/OTP required."
            echo "::group::publish.log"
            cat publish.log
            echo "::endgroup::"
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.check.outputs.already != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          body_path: CHANGELOG.md
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
